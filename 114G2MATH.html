<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>國小二年級數學 暑假線上測驗</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, '微軟正黑體';
            background-color: #f4f7f6;
            color: #333;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 40px 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        h1, h2 {
            text-align: center;
            color: #2c3e50;
        }
        
        /* 目錄頁的網格排版，讓 13 個按鈕整齊排列 */
        #unit-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        
        .unit-btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 15px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            transition: 0.3s;
            width: 100%;
            box-sizing: border-box;
        }
        .unit-btn:hover { background-color: #2980b9; transform: translateY(-3px); box-shadow: 0 5px 15px rgba(41, 128, 185, 0.4); }
        
        .question-box {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 25px;
            color: #2c3e50;
        }
        .option-label {
            display: block;
            background: #ecf0f1;
            padding: 18px;
            margin-bottom: 12px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 18px;
            transition: 0.2s;
            border: 2px solid transparent;
        }
        .option-label:hover { background: #dcdde1; border-color: #bdc3c7; }
        input[type="radio"] { margin-right: 15px; transform: scale(1.5); }
        
        .btn-submit, .btn-next, .btn-menu {
            display: block;
            width: 100%;
            border: none;
            padding: 18px;
            font-size: 20px;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 25px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-submit { background-color: #27ae60; color: white; }
        .btn-submit:hover { background-color: #219150; }
        
        .btn-next { background-color: #f39c12; color: white; display: none; }
        .btn-next:hover { background-color: #d68910; }

        .btn-menu { 
            background-color: #8e44ad; 
            color: white; 
            margin-top: 40px;
            box-shadow: 0 5px 15px rgba(142, 68, 173, 0.4);
        }
        .btn-menu:hover { background-color: #732d91; transform: translateY(-2px); }

        #feedback {
            margin-top: 25px;
            padding: 20px;
            border-radius: 10px;
            font-weight: bold;
            display: none;
            font-size: 18px;
        }
        .correct { background-color: #d4edda; color: #155724; border: 2px solid #c3e6cb; }
        .incorrect { background-color: #f8d7da; color: #721c24; border: 2px solid #f5c6cb; }
        
        #score-board {
            text-align: center;
            padding: 20px 0;
        }
        
        .menu-screen, .quiz-screen, .score-screen { display: none; }
        .active-screen { display: block !important; }
        
        .score-display {
            font-size: 72px; 
            margin: 30px 0; 
            font-weight: 900; 
            color: #e74c3c;
            background: #fdf0ed;
            padding: 20px;
            border-radius: 15px;
            display: inline-block;
            min-width: 300px;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="menu-screen" class="menu-screen active-screen">
        <h1>國小二年級數學 暑假測驗</h1>
        <p style="text-align: center; font-size: 20px; color: #555; margin-bottom: 30px;">請點擊下方按鈕選擇測驗單元：</p>
        <div id="unit-buttons">
            </div>
    </div>

    <div id="quiz-screen" class="quiz-screen">
        <button onclick="returnToMenu()" style="margin-bottom: 20px; cursor: pointer; padding: 10px 15px; background: #ecf0f1; border: 1px solid #bdc3c7; border-radius: 8px; font-weight: bold; color: #2c3e50;">🔙 中斷測驗，返回目錄</button>
        
        <h2 id="current-unit-title" style="color: #2980b9; font-size: 28px; border-bottom: 2px solid #3498db; padding-bottom: 10px;">單元名稱</h2>
        <p style="font-weight: bold; color: #7f8c8d; font-size: 18px;">目前進度： <span id="progress" style="color: #e67e22; font-size: 22px;">1 / 20</span></p>
        
        <div class="question-box" id="question-text">題目文字</div>
        <div id="options-container">
            </div>
        
        <button id="submit-btn" class="btn-submit" onclick="checkAnswer()">確認答案</button>
        
        <div id="feedback">回饋訊息</div>
        <button id="next-btn" class="btn-next" onclick="nextQuestion()">下一題</button>
    </div>

    <div id="score-board" class="score-screen">
        <h2 style="font-size: 36px; color: #27ae60;">🎉 測驗結束！</h2>
        <p style="font-size: 22px; color: #555; margin-top: 20px;">你的成績（答對題數 / 總共題數）：</p>
        
        <div class="score-display" id="final-score">
            0 / 20
        </div>
        
        <p id="score-message" style="font-size: 22px; font-weight: bold; margin-bottom: 20px;"></p>
        
        <button class="btn-menu" onclick="returnToMenu()">🏠 返回目錄頁，選擇其他單元</button>
    </div>
</div>

<script>

    let currentUnitId = null;
    let currentQuestions = [];
    let currentQuestionIndex = 0;
    let score = 0;

    window.onload = function() {
        const btnContainer = document.getElementById('unit-buttons');
        for (const unitId in quizData) {
            const btn = document.createElement('button');
            btn.className = 'unit-btn';
            btn.innerText = quizData[unitId].title;
            btn.onclick = () => startQuiz(unitId);
            btnContainer.appendChild(btn);
        }
    };

    function startQuiz(unitId) {
        currentUnitId = unitId;
        currentQuestions = quizData[unitId].questions;
        currentQuestionIndex = 0;
        score = 0;
        
        document.getElementById('menu-screen').classList.remove('active-screen');
        document.getElementById('score-board').classList.remove('active-screen');
        document.getElementById('quiz-screen').classList.add('active-screen');
        
        document.getElementById('current-unit-title').innerText = quizData[unitId].title;
        loadQuestion();
    }

    function loadQuestion() {
        document.getElementById('feedback').style.display = 'none';
        document.getElementById('submit-btn').style.display = 'block';
        document.getElementById('next-btn').style.display = 'none';
        
        const q = currentQuestions[currentQuestionIndex];
        document.getElementById('progress').innerText = `${currentQuestionIndex + 1} / ${currentQuestions.length}`;
        document.getElementById('question-text').innerText = `${currentQuestionIndex + 1}. ${q.question}`;
        
        const optionsContainer = document.getElementById('options-container');
        optionsContainer.innerHTML = '';
        
        q.answerOptions.forEach((option, index) => {
            const label = document.createElement('label');
            label.className = 'option-label';
            label.innerHTML = `<input type="radio" name="option" value="${index}"> ${option.text}`;
            optionsContainer.appendChild(label);
        });
    }

    function checkAnswer() {
        const selected = document.querySelector('input[name="option"]:checked');
        if (!selected) {
            alert('請先選擇一個答案！');
            return;
        }

        const selectedIndex = parseInt(selected.value);
        const q = currentQuestions[currentQuestionIndex];
        const feedbackDiv = document.getElementById('feedback');
        
        document.getElementById('submit-btn').style.display = 'none';
        const nextBtn = document.getElementById('next-btn');
        nextBtn.style.display = 'block';
        feedbackDiv.style.display = 'block';

        if (currentQuestionIndex === currentQuestions.length - 1) {
            nextBtn.innerText = "完成測驗，觀看成績 ➜";
            nextBtn.style.backgroundColor = "#8e44ad";
        } else {
            nextBtn.innerText = "下一題 ➜";
            nextBtn.style.backgroundColor = "#f39c12";
        }

        document.querySelectorAll('input[name="option"]').forEach(input => input.disabled = true);

        if (q.answerOptions[selectedIndex].isCorrect) {
            score++;
            feedbackDiv.className = 'correct';
            feedbackDiv.innerHTML = `✅ 答對了！<br><span style="font-weight:normal; font-size:16px; color:#333; margin-top:8px; display:inline-block;">解析：${q.answerOptions[selectedIndex].rationale}</span>`;
        } else {
            feedbackDiv.className = 'incorrect';
            const correctAnswer = q.answerOptions.find(opt => opt.isCorrect).text;
            feedbackDiv.innerHTML = `❌ 答錯了。正確答案是：<strong>${correctAnswer}</strong><br><span style="font-weight:normal; font-size:16px; color:#333; margin-top:8px; display:inline-block;">解析：${q.answerOptions[selectedIndex].rationale}</span>`;
        }
    }

    function nextQuestion() {
        currentQuestionIndex++;
        if (currentQuestionIndex < currentQuestions.length) {
            loadQuestion();
        } else {
            showScore();
        }
    }

    function showScore() {
        document.getElementById('menu-screen').classList.remove('active-screen');
        document.getElementById('quiz-screen').classList.remove('active-screen');
        document.getElementById('score-board').classList.add('active-screen');
        
        document.getElementById('final-score').innerText = `${score} / ${currentQuestions.length}`;
        
        const percentage = Math.round((score / currentQuestions.length) * 100);
        let msg = "";
        if(percentage === 100) msg = "太完美了！你全答對了！🏆";
        else if(percentage >= 80) msg = "太厲害了！你對這個單元非常熟悉喔！💯";
        else if(percentage >= 60) msg = "表現不錯！繼續保持學習熱情！👍";
        else msg = "別氣餒，看過解析多複習幾次，一定會越來越好的！💪";
        
        document.getElementById('score-message').innerText = msg;
    }

    function returnToMenu() {
        document.getElementById('score-board').classList.remove('active-screen');
        document.getElementById('quiz-screen').classList.remove('active-screen');
        document.getElementById('menu-screen').classList.add('active-screen');
    }
</script>

</body>
</html>
