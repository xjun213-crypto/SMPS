<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>二下數學測驗 - 第四單元：平面圖形與立體形體</title>
    <style>
        /* 全域邊距修正，防止元件被撐開 */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #f0fdfa; /* 清爽的淺藍綠色底 */
        }

        body {
            font-family: "Microsoft JhengHei", -apple-system, BlinkMacSystemFont, Arial, sans-serif;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
        }

        /* 核心主外框：隨螢幕自適應寬度 */
        .quiz-container {
            background-color: #ffffff;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            padding: 24px;
            width: 100%;
            max-width: 540px;
            max-height: 96vh;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        h2 {
            color: #0d9488;
            text-align: center;
            margin-top: 0;
            margin-bottom: 16px;
            font-size: 1.4em;
            border-bottom: 2px solid #99f6e4;
            padding-bottom: 8px;
            flex-shrink: 0;
        }

        .progress {
            font-size: 0.9em;
            color: #7f8c8d;
            text-align: right;
            margin-bottom: 12px;
            flex-shrink: 0;
        }

        .question {
            font-size: 1.15em;
            font-weight: bold;
            line-height: 1.5;
            margin-bottom: 16px;
            color: #2c3e50;
            word-break: break-all;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
        }

        .option-btn {
            background-color: #fff;
            border: 2px solid #cbd5e1;
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 1em;
            cursor: pointer;
            text-align: left;
            transition: all 0.15s ease;
            outline: none;
            width: 100%;
            word-break: break-all;
        }

        @media (hover: hover) {
            .option-btn:hover:not([disabled]) {
                background-color: #f0fdfa;
                border-color: #0d9488;
            }
        }

        .option-btn.correct {
            background-color: #d1fae5;
            border-color: #10b981;
            color: #065f46;
            font-weight: bold;
        }

        .option-btn.wrong {
            background-color: #fee2e2;
            border-color: #ef4444;
            color: #991b1b;
        }

        .feedback-box {
            margin-top: 16px;
            padding: 12px;
            border-radius: 8px;
            display: none;
            line-height: 1.5;
            font-size: 0.95em;
        }

        .feedback-box.correct {
            background-color: #ecfdf5;
            border-left: 5px solid #10b981;
            color: #065f46;
        }

        .feedback-box.wrong {
            background-color: #fff5f5;
            border-left: 5px solid #ef4444;
            color: #991b1b;
        }

        .next-btn {
            width: 100%;
            background-color: #0d9488;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-size: 1.05em;
            font-weight: bold;
            cursor: pointer;
            margin-top: 16px;
            text-align: center;
            display: none;
            flex-shrink: 0;
        }

        .next-btn:hover {
            background-color: #0f766e;
        }

        .result-screen {
            text-align: center;
            display: none;
        }

        .score {
            font-size: 2.8em;
            font-weight: bold;
            color: #0d9488;
            margin: 16px 0;
        }

        .restart-btn {
            background-color: #10b981;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-size: 1.05em;
            font-weight: bold;
            cursor: pointer;
            margin-top: 8px;
        }

        .restart-btn:hover {
            background-color: #059669;
        }

        @media screen and (max-width: 380px) {
            body { padding: 6px; }
            .quiz-container { padding: 16px; }
            h2 { font-size: 1.2em; margin-bottom: 12px; }
            .question { font-size: 1.05em; margin-bottom: 12px; }
            .option-btn { padding: 10px 14px; font-size: 0.95em; }
        }
    </style>
</head>
<body>

    <div class="quiz-container">
        <div id="quiz-screen" style="width: 100%;">
            <h2>第四單元：平面圖形與立體形體</h2>
            <div class="progress" id="progress-text">第 1 / 20 題</div>
            <div class="question" id="question-text">題目載入中...</div>
            <div class="options-container" id="options-box"></div>
            <div class="feedback-box" id="feedback-text"></div>
            <button class="next-btn" id="next-button" onclick="nextQuestion()">下一題</button>
        </div>

        <div id="result-screen" class="result-screen" style="width: 100%;">
            <h2>測驗結束！</h2>
            <p style="margin: 8px 0;">你的總分數是：</p>
            <div class="score" id="final-score">0 分</div>
            <p id="evaluation-text" style="margin-bottom: 20px; font-weight: bold; color: #555;"></p>
            <button class="restart-btn" onclick="restartQuiz()">再測驗一次</button>
        </div>
    </div>

    <script>
        // 20題平面圖形與立體形體單元題目資料庫
        const questions = [
            {
                "question": "在平面圖形中，兩條直線邊相交碰在一起的地方，我們叫作什麼？",
                "options": ["頂點", "中心點", "角", "邊線"],
                "answer": 0,
                "rationale": "兩條邊相交相接的「那個點」叫作「頂點」；而兩條邊夾出來的空間才叫作「角」。"
            },
            {
                "question": "一個標準的「三角形」圖形，一共有幾個邊、幾個角和幾個頂點？",
                "options": ["2個邊、2個角、2個頂點", "3個邊、3個角、3個頂點", "3個邊、4個角、3個頂點", "4個邊、3個角、4個頂點"],
                "answer": 1,
                "rationale": "三角形的名稱就告訴我們它有 3 個角，同時它也會有 3 條直直的邊和 3 個尖尖的頂點。"
            },
            {
                "question": "有一個圖形有 4 條直直的邊和 4 個頂點，而且這 4 條邊「每一條都一樣長」。請問它是什麼圖形？",
                "options": ["三角形", "長方形", "正方形", "圓形"],
                "answer": 2,
                "rationale": "有 4 條邊且 4 條邊「一樣長」的圖形是「正方形」。長方形雖然也有 4 條邊，但通常是上下長度一樣、左右長度一樣，4 條邊不一定都一樣長。"
            },
            {
                "question": "關於「長方形」和「正方形」的相同點，下面哪一個說法是正確的？",
                "options": ["它們的 4 條邊都一樣長", "它們都有 4 個邊、4 個角和 4 個頂點", "它們都長得扁扁長長的", "它們都沒有頂點"],
                "answer": 1,
                "rationale": "正方形和長方形都屬於四邊形，它們共同的特徵就是都有 4 個邊、4 個角和 4 個頂點。"
            },
            {
                "question": "下面哪一個圖形，周圍是彎彎的曲線，找不到任何直直的邊，也沒有任何尖尖的頂點？",
                "options": ["正方形", "長方形", "圓形", "三角形"],
                "answer": 2,
                "rationale": "圓形是由曲線組成的，它沒有直直的邊，也沒有任何尖尖的頂點。"
            },
            {
                "question": "如果一個圖形有 5 條邊、5 個頂點和 5 個角，我們通常會叫它什麼圖形？",
                "options": ["四邊形", "五邊形", "六邊形", "多角形"],
                "answer": 1,
                "rationale": "幾邊形就是看它有幾條邊。有 5 條邊、5 個頂點的圖形就叫作「五邊形」。"
            },
            {
                "question": "小華拿一張正方形的色紙，用剪刀沿著相對的兩個頂點「直直剪一刀」，會剪出兩個什麼圖形？",
                "options": ["兩個長方形", "兩個正方形", "兩個三角形", "兩個圓形"],
                "answer": 2,
                "rationale": "正方形斜斜地從對角剪開，會把原來的四邊形切成兩個一模一樣的三角形。"
            },
            {
                "question": "下面哪一個選項所形容的東西是「立體形體」，而不是扁扁的「平面圖形」？",
                "options": ["畫在紙上的三角形", "一個可以拿在手上的木頭正方體積木", "課本封面的長方形", "黑板上的圓形圖案"],
                "answer": 1,
                "rationale": "畫在紙上或表面上、只有上下左右的是平面圖形；有厚度、有空間、可以拿在手上摸到各個面的，是「立體形體」。"
            },
            {
                "question": "我們平常玩遊戲丟的「骰子」，形狀是一個標準的「正方體」。請問一個正方體一共有幾個面？",
                "options": ["4個面", "6個面", "8個面", "12個面"],
                "answer": 1,
                "rationale": "骰子有 1 到 6 點，每一個點數代表一個面，所以正方體一共有 6 個面。"
            },
            {
                "question": "請問「正方體」和「長方體」一共有幾個尖尖的「頂點」？",
                "options": ["4個", "6個", "8個", "12個"],
                "answer": 2,
                "rationale": "正方體和長方體上面有 4 個頂點，下面也有 4 個頂點，合起來一共有 8 個頂點。"
            },
            {
                "question": "請問「正方體」和「長方體」一共有幾條直直的「邊」？",
                "options": ["6條", "8條", "12條", "16條"],
                "answer": 2,
                "rationale": "它們的架構中，上面有 4 條邊，下面有 4 條邊，四周垂直的柱子也有 4 條邊，合起來一共有 12 條邊。"
            },
            {
                "question": "關於「正方體」的 6 個面，下面哪一個形容是最正確的？",
                "options": ["6個面都是一樣大的正方形", "6個面都是扁扁的長方形", "有的是正方形，有的是圓形", "每個面大小都不一樣"],
                "answer": 0,
                "rationale": "正方體的特徵就是它的 6 個面「全部都是一模一樣大的正方形」。"
            },
            {
                "question": "小美看到一個鞋盒，它有 6 個面、12 條邊、8 個頂點，但每個面「不全是一樣大的正方形」。這是一個什麼形體？",
                "options": ["正方體", "長方體", "圓柱體", "球體"],
                "answer": 1,
                "rationale": "有 6 個面、12 條邊、8 個頂點，且面主要是由長方形組成的，這叫作「長方體」。"
            },
            {
                "question": "小同把一個膠水瓶或飲料罐躺在桌上，發現它「可以滾動」；但如果把它直直站立著，頂部和底部又是「平平的面可以堆疊」。請問這是什麼形體？",
                "options": ["正方體", "長方體", "圓柱體", "球體"],
                "answer": 2,
                "rationale": "圓柱體有彎彎的曲面（可以滾動），也有上下兩個平平的圓形面（可以直立堆疊）。"
            },
            {
                "question": "體育課玩的籃球、排球或躲避球，它們全身上下都是彎彎的面，沒有任何平平的面。這在數學上叫作什麼形體？",
                "options": ["圓柱體", "長方體", "球體", "正方體"],
                "answer": 2,
                "rationale": "像球一樣，不管從哪一個方向看都是圓的，且完全沒有平平的面、會往四面八方滾動的形體叫作「球體」。"
            },
            {
                "question": "如果我們把一個「圓柱體」的底部放在紙上，用鉛筆沿著邊緣描畫一圈，拿開圓柱體後，紙上會出現什麼平面圖形？",
                "options": ["正方形", "長方形", "圓形", "三角形"],
                "answer": 2,
                "rationale": "圓柱體的頂部和底部都是平平的「圓形」，所以描下來的圖形會是「圓形」。"
            },
            {
                "question": "媽媽拿一個標準的長方體面紙盒放在紙上，把它的其中一個面描下來。紙上最可能出現什麼平面圖形？",
                "options": ["圓形", "長方形", "三角形", "五邊形"],
                "answer": 1,
                "rationale": "長方體的面是由長方形組成的（有時會包含兩個正方形），所以描下來會得到「長方形」或正方形。"
            },
            {
                "question": "學校要舉辦堆積木比賽，看誰疊得最高最穩。請問選下面哪一組積木最「不容易」滾落、最適合堆疊？",
                "options": ["全部都是球體的積木", "全部都是正方體和長方體的積木", "全部都是圓柱體躺著放的積木", "隨便哪一種都一樣"],
                "answer": 1,
                "rationale": "正方體和長方體全身上下都是平平的面，平平的面碰在一起最穩固、最適合堆疊，不會像球體或躺著的圓柱體一樣滾走。"
            },
            {
                "question": "關於三角形的「邊」，下面哪一個形容是正確的？",
                "options": ["三角形的邊可以歪歪扭扭的", "三角形的 3 條邊都必須是直直的線", "三角形一定要有 1 條邊是彎的", "三角形的邊不能碰到在一起"],
                "answer": 1,
                "rationale": "在數學上，圖形的「邊」指的是直線段。所以三角形的 3 條邊都必須是直直的線，如果是彎的就不能叫三角形了。"
            },
            {
                "question": "小明數一個立體形體，發現它有 6 個面、12 條邊、8 個頂點。這個形體**不可能**是下面哪一個？",
                "options": ["大冰箱", "標準的骰子", "一顆正圓的西瓜", "一個方形的餅乾鐵盒"],
                "answer": 2,
                "rationale": "有 6 面、12 邊、8 頂點的是正方體或長方體（冰箱、骰子、鐵盒都是）。而正圓的西瓜是「球體」，球體沒有這些邊和頂點，所以不可能是西瓜。"
            }
        ];

        let currentQuestionIndex = 0;
        let score = 0;
        let answered = false;

        function loadQuestion() {
            answered = false;
            const currentQuestion = questions[currentQuestionIndex];
            
            document.getElementById("progress-text").innerText = `第 ${currentQuestionIndex + 1} / ${questions.length} 題`;
            document.getElementById("question-text").innerText = currentQuestion.question;
            
            const optionsBox = document.getElementById("options-box");
            optionsBox.innerHTML = "";
            
            currentQuestion.options.forEach((option, index) => {
                const button = document.createElement("button");
                button.className = "option-btn";
                button.innerText = option;
                button.onclick = () => selectOption(index);
                optionsBox.appendChild(button);
            });
            
            document.getElementById("feedback-text").style.display = "none";
            document.getElementById("next-button").style.display = "none";
        }

        function selectOption(selectedIndex) {
            if (answered) return;
            answered = true;
            
            const currentQuestion = Math.min(currentQuestionIndex, questions.length - 1);
            const qData = questions[currentQuestion];
            const buttons = document.getElementsByClassName("option-btn");
            const feedbackBox = document.getElementById("feedback-text");
            
            for (let i = 0; i < buttons.length; i++) {
                buttons[i].disabled = true;
            }
            
            if (selectedIndex === qData.answer) {
                buttons[selectedIndex].classList.add("correct");
                feedbackBox.className = "feedback-box correct";
                feedbackBox.innerHTML = `<strong>⭕ 答對了！</strong><br>${qData.rationale}`;
                score += 5;
            } else {
                buttons[selectedIndex].classList.add("wrong");
                buttons[qData.answer].classList.add("correct");
                feedbackBox.className = "feedback-box wrong";
                feedbackBox.innerHTML = `<strong>❌ 答錯囉！</strong><br>${qData.rationale}`;
            }
            
            feedbackBox.style.display = "block";
            document.getElementById("next-button").style.display = "block";
        }

        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < questions.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            document.getElementById("quiz-screen").style.display = "none";
            document.getElementById("result-screen").style.display = "block";
            document.getElementById("final-score").innerText = `${score} 分`;
            
            const evaluationText = document.getElementById("evaluation-text");
            if (score === 100) {
                evaluationText.innerText = "太厲害了！你擁有完美的空間幾何智慧，全部答對！💯";
            } else if (score >= 80) {
                evaluationText.innerText = "非常傑出！平面和立體圖形的特徵你都分得很清楚喔！🌟";
            } else if (score >= 60) {
                evaluationText.innerText = "及格了！關於正方體、長方體的邊和頂點數量，要再多記一下喔。👍";
            } else {
                evaluationText.innerText = "再接再厲！多摸摸身邊的盒子、球跟膠水瓶，感受一下面和邊，加油！💪";
            }
        }

        function restartQuiz() {
            score = 0;
            currentQuestionIndex = 0;
            document.getElementById("result-screen").style.display = "none";
            document.getElementById("quiz-screen").style.display = "block";
            loadQuestion();
        }

        window.onload = loadQuestion;
    </script>
</body>
</html>
