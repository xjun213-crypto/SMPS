<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>二下數學測驗 - 第四單元：平面圖形與立體形體</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #f0fdf4; /* 清新的淺薄荷綠底色 */
        }

        body {
            font-family: "Microsoft JhengHei", -apple-system, BlinkMacSystemFont, Arial, sans-serif;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
        }

        .quiz-container {
            background-color: #ffffff;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(5, 150, 105, 0.15);
            padding: 24px;
            width: 100%;
            max-width: 540px;
            max-height: 96vh;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        h2 {
            color: #047857;
            text-align: center;
            margin-top: 0;
            margin-bottom: 16px;
            font-size: 1.4em;
            border-bottom: 2px solid #a7f3d0;
            padding-bottom: 8px;
            flex-shrink: 0;
        }

        .progress {
            font-size: 0.9em;
            color: #4b5563;
            text-align: right;
            margin-bottom: 12px;
            flex-shrink: 0;
        }

        .question {
            font-size: 1.15em;
            font-weight: bold;
            line-height: 1.5;
            margin-bottom: 16px;
            color: #1f2937;
            word-break: break-all;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
        }

        .option-btn {
            background-color: #fff;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 1em;
            cursor: pointer;
            text-align: left;
            transition: all 0.15s ease;
            outline: none;
            width: 100%;
            word-break: break-all;
        }

        @media (hover: hover) {
            .option-btn:hover:not([disabled]) {
                background-color: #f0fdf4;
                border-color: #10b981;
            }
        }

        .option-btn.correct {
            background-color: #d1fae5;
            border-color: #10b981;
            color: #065f46;
            font-weight: bold;
        }

        .option-btn.wrong {
            background-color: #fee2e2;
            border-color: #ef4444;
            color: #991b1b;
        }

        .feedback-box {
            margin-top: 16px;
            padding: 12px;
            border-radius: 8px;
            display: none;
            line-height: 1.5;
            font-size: 0.95em;
        }

        .feedback-box.correct {
            background-color: #ecfdf5;
            border-left: 5px solid #10b981;
            color: #065f46;
        }

        .feedback-box.wrong {
            background-color: #fff5f5;
            border-left: 5px solid #ef4444;
            color: #991b1b;
        }

        .next-btn {
            width: 100%;
            background-color: #059669;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-size: 1.05em;
            font-weight: bold;
            cursor: pointer;
            margin-top: 16px;
            text-align: center;
            display: none;
            flex-shrink: 0;
        }

        .next-btn:hover {
            background-color: #047857;
        }

        .result-screen {
            text-align: center;
            display: none;
        }

        .score {
            font-size: 2.8em;
            font-weight: bold;
            color: #059669;
            margin: 16px 0;
        }

        .restart-btn {
            background-color: #10b981;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-size: 1.05em;
            font-weight: bold;
            cursor: pointer;
            margin-top: 8px;
        }

        .restart-btn:hover {
            background-color: #059669;
        }

        @media screen and (max-width: 380px) {
            body { padding: 6px; }
            .quiz-container { padding: 16px; }
            h2 { font-size: 1.2em; margin-bottom: 12px; }
            .question { font-size: 1.05em; margin-bottom: 12px; }
            .option-btn { padding: 10px 14px; font-size: 0.95em; }
        }
    </style>
</head>
<body>

    <div class="quiz-container">
        <div id="quiz-screen" style="width: 100%;">
            <h2>第四單元：平面與立體形體 測驗</h2>
            <div class="progress" id="progress-text">第 1 / 20 題</div>
            <div class="question" id="question-text">題目載入中...</div>
            <div class="options-container" id="options-box"></div>
            <div class="feedback-box" id="feedback-text"></div>
            <button class="next-btn" id="next-button" onclick="nextQuestion()">下一題</button>
        </div>

        <div id="result-screen" class="result-screen" style="width: 100%;">
            <h2>測驗結束！</h2>
            <p style="margin: 8px 0;">你的總分數是：</p>
            <div class="score" id="final-score">0 分</div>
            <p id="evaluation-text" style="margin-bottom: 20px; font-weight: bold; color: #555;"></p>
            <button class="restart-btn" onclick="restartQuiz()">再測驗一次</button>
        </div>
    </div>

    <script>
        // 20題幾何與形體題目資料
        const questions = [
            {
                "question": "我們認識的「三角形」，它一共有幾條邊、幾個角和幾個頂點？",
                "options": ["2 條邊、2 個角、2 個頂點", "3 條邊、3 個角、3 個頂點", "4 條邊、4 個角、4 個頂點", "3 條邊、4 個角、3 個頂點"],
                "answer": 1,
                "rationale": "三角形顧名思義，一定有 3 條直線組成的邊、3 個角，以及 3 個尖尖的頂點。"
            },
            {
                "question": "「正方形」和「長方形」這兩種圖形，它們都一共有幾個角、幾個頂點？",
                "options": ["都有 3 個角和 3 個頂點", "都有 4 個角和 4 個頂點", "都有 5 個角和 5 個頂點", "正方形有 4 個，長方形有 6 個"],
                "answer": 1,
                "rationale": "正方形和長方形都是四邊形，所以它們都固定擁有 4 個角和 4 個頂點。"
            },
            {
                "question": "關於平面圖形，兩條直線邊相交、摸起來尖尖的地方叫作什麼？",
                "options": ["直角", "邊長", "頂點", "面"],
                "answer": 2,
                "rationale": "兩條直線邊碰在一起所形成尖尖的交點，在數學上叫作「頂點」。"
            },
            {
                "question": "在平面圖形中，兩條邊所夾起來的地方叫作什麼？",
                "options": ["邊", "角", "頂點", "內部"],
                "answer": 1,
                "rationale": "由同一個頂點引出兩條邊，兩條邊之間所夾的空間就叫作「角」。"
            },
            {
                "question": "小明用籬笆把菜園圍了一整圈。這條圍成一整圈的「線」，叫作菜園的什麼？",
                "options": ["內部", "外部", "周界", "中心點"],
                "answer": 2,
                "rationale": "圍繞圖形一整圈、把裡面和外面分開的封閉曲線或直線，叫作「周界」。"
            },
            {
                "question": "媽媽把湯圓煮好放在碗裡。請問湯圓是位在碗的哪一個地方？",
                "options": ["碗的內部", "碗的外部", "碗的周界", "碗的外面"],
                "answer": 0,
                "rationale": "被碗的邊緣（周界）包圍在裡面的空間，就是碗的「內部」。"
            },
            {
                "question": "弟弟在遊樂園的圍欄外面看恐龍模型。請問弟弟是位在遊樂園的哪裡？",
                "options": ["內部", "外部", "周界", "正中央"],
                "answer": 1,
                "rationale": "在周界外面的區域、沒有被包圍的地方，叫作「外部」。"
            },
            {
                "question": "在數學上，平面圖形「周界」的總長度，我們把它叫作什麼？",
                "options": ["邊長", "面積", "周長", "長度"],
                "answer": 2,
                "rationale": "圍繞平面圖形一圈的周界總長度，就簡稱為「周長」。"
            },
            {
                "question": "如果用繩子排一個圖形，但是「線沒有接好、留了一個缺口」，請問這個圖形有周界和內部嗎？",
                "options": ["有周界，也有內部", "有周界，但沒有內部", "沒有封閉，所以沒有周界，也沒有內部", "只要有繩子就有內部"],
                "answer": 2,
                "rationale": "周界必須是完全「封閉」不能有缺口的。有缺口就無法分出裡面和外面，所以沒有周界和內部。"
            },
            {
                "question": "透過摺紙活動，我們會發現「正方形」的 4 條邊有什麼特別的關係？",
                "options": ["4 條邊都一樣長", "只有上面的邊比較長", "對面的邊一樣長，鄰居的邊不一樣長", "每條邊都不一樣長"],
                "answer": 0,
                "rationale": "正方形最重要特徵就是：它的 4 條邊經過實測或摺紙比對，長度都會「完全一樣長」。"
            },
            {
                "question": "透過摺紙活動，我們會發現「長方形」的邊有什麼特別的關係？",
                "options": ["4 條邊都一樣長", "相對面的兩條邊（對邊）會一樣長", "每條邊都不一樣長", "只有兩條邊一樣長，其他都很短"],
                "answer": 1,
                "rationale": "長方形的特徵是上下對邊一樣長、左右對邊一樣長，這叫作「對邊一樣長」。"
            },
            {
                "question": "有一個正方形的圖畫紙，用尺量出它的其中一條邊長是 5 公分。請問它的周長是多少公分？",
                "options": ["5 公分", "10 公分", "15 公分", "20 公分"],
                "answer": 3,
                "rationale": "正方形有 4 條一樣長的邊，周長就是 5 + 5 + 5 + 5 ＝ 20 公分（或 5 × 4 ＝ 20）。"
            },
            {
                "question": "有一個三角形的積木，三條邊的長度分別是 4 公分、5 公分和 6 公分。請問這個三角形的周長是多少公分？",
                "options": ["12 公分", "15 公分", "9 公分", "20 公分"],
                "answer": 1,
                "rationale": "三角形的周長就是把 3 條邊的長度加起來：4 ＋ 5 ＋ 6 ＝ 15 公分。"
            },
            {
                "question": "一張長方形卡片，長是 7 公分，寬是 3 公分。請問這張卡片的周長是多少公分？",
                "options": ["10 公分", "14 公分", "20 公分", "21 公分"],
                "answer": 2,
                "rationale": "長方形有兩條長和兩條寬，周長是 7 ＋ 3 ＋ 7 ＋ 3 ＝ 20 公分。"
            },
            {
                "question": "我們常玩的骰子或正方體積木，它一共有幾個「面」？這些面是什麼形狀？",
                "options": ["4 個面，都是三角形", "6 個面，都是長方形", "6 個面，都是一樣大的正方形", "8 個面，都是正方形"],
                "answer": 2,
                "rationale": "正方體有 6 個面，而且這 6 個面全都是大小完全相同的正方形。"
            },
            {
                "question": "媽媽買的面紙盒是一個「長方體」，它一共有幾個面？這些面通常是什麼形狀？",
                "options": ["6 個面，通常是長方形", "6 個面，一定全都是正方形", "4 個面，通常是長方形", "12 個面，都是長方形"],
                "answer": 0,
                "rationale": "長方體跟正方體一樣有 6 個面，但是長方體的面通常是「長方形」（有時可能包含一組正方形）。"
            },
            {
                "question": "不管是「正方體」還是「長方體」，它們都固定擁有幾個頂點和幾條邊？",
                "options": ["6 個頂點、12 條邊", "8 個頂點、12 條邊", "12 個頂點、8 條邊", "8 個頂點、6 條邊"],
                "answer": 1,
                "rationale": "立體的正方體與長方體，都擁有 8 個尖尖的頂點，以及 12 條直線組成骨架的邊。"
            },
            {
                "question": "把一個空的正方體紙盒沿著邊剪開並攤平，一共可以數出幾個正方形的面？",
                "options": ["4 個", "6 個", "8 個", "12 個"],
                "answer": 1,
                "rationale": "因為正方體原本就是由 6 個面組成的，所以攤平後依然是 6 個正方形的面。"
            },
            {
                "question": "老師把一堆圖形放在桌上。小明先找出「所有有 4 條邊的圖形」，接著再從中找出「4 條邊都一樣長」的。請問小明最後挑出來的是什麼圖形？",
                "options": ["三角形", "長方形", "正方形", "圓形"],
                "answer": 2,
                "rationale": "有 4 條邊且 4 條邊都一樣長的圖形，就是正方形。這是利用圖形特徵進行「再分類」。"
            },
            {
                "question": "箱子裡有各式各樣的立體積木。姐姐第一步先挑出「有 6 個面、8 個頂點、12 條邊」的積木，第二步再挑出「每個面都是正方形」的積木。請問姐姐最後拿出的是什麼體？",
                "options": ["球體", "長方體", "正方體", "圓柱體"],
                "answer": 2,
                "rationale": "第一步挑出了正方體和長方體，第二步限定每個面都要是正方形，因此篩選出來的子集合就是「正方體」。"
            }
        ];

        let currentQuestionIndex = 0;
        let score = 0;
        let answered = false;

        function loadQuestion() {
            answered = false;
            const currentQuestion = questions[currentQuestionIndex];
            
            document.getElementById("progress-text").innerText = `第 ${currentQuestionIndex + 1} / ${questions.length} 題`;
            document.getElementById("question-text").innerText = currentQuestion.question;
            
            const optionsBox = document.getElementById("options-box");
            optionsBox.innerHTML = "";
            
            currentQuestion.options.forEach((option, index) => {
                const button = document.createElement("button");
                button.className = "option-btn";
                button.innerText = option;
                button.onclick = () => selectOption(index);
                optionsBox.appendChild(button);
            });
            
            document.getElementById("feedback-text").style.display = "none";
            document.getElementById("next-button").style.display = "none";
        }

        function selectOption(selectedIndex) {
            if (answered) return;
            answered = true;
            
            const currentQuestion = Math.min(currentQuestionIndex, questions.length - 1);
            const qData = questions[currentQuestion];
            const buttons = document.getElementsByClassName("option-btn");
            const feedbackBox = document.getElementById("feedback-text");
            
            for (let i = 0; i < buttons.length; i++) {
                buttons[i].disabled = true;
            }
            
            if (selectedIndex === qData.answer) {
                buttons[selectedIndex].classList.add("correct");
                feedbackBox.className = "feedback-box correct";
                feedbackBox.innerHTML = `<strong>⭕ 答對了！空間幾何觀念極佳！</strong><br>${qData.rationale}`;
                score += 5;
            } else {
                buttons[selectedIndex].classList.add("wrong");
                buttons[qData.answer].classList.add("correct");
                feedbackBox.className = "feedback-box wrong";
                feedbackBox.innerHTML = `<strong>❌ 答錯囉！觀察解析動腦想一想：</strong><br>${qData.rationale}`;
            }
            
            feedbackBox.style.display = "block";
            document.getElementById("next-button").style.display = "block";
        }

        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < questions.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            document.getElementById("quiz-screen").style.display = "none";
            document.getElementById("result-screen").style.display = "block";
            document.getElementById("final-score").innerText = `${score} 分`;
            
            const evaluationText = document.getElementById("evaluation-text");
            if (score === 100) {
                evaluationText.innerText = "太完美了！圖形的邊角特徵和立體積木的祕密都被你徹底看穿了！💯";
            } else if (score >= 80) {
                evaluationText.innerText = "非常優秀！周長的計算和圖形再分類都難不倒你，空間感很棒！🌟";
            } else if (score >= 60) {
                evaluationText.innerText = "順利及格！要分清楚長方體和正方體的差別，還有周界必須是封閉的喔！👍";
            } else {
                evaluationText.innerText = "再接再厲！拿家裡的面紙盒、骰子或紙張親自摸摸看、摺摺看，會更有感覺喔！💪";
            }
        }

        function restartQuiz() {
            score = 0;
            currentQuestionIndex = 0;
            document.getElementById("result-screen").style.display = "none";
            document.getElementById("quiz-screen").style.display = "block";
            loadQuestion();
        }

        window.onload = loadQuestion;
    </script>
</body>
</html>
